[[permission]]
identifier = "allow-app-ipc"
description = "Allows dictionary, cards, collections, review, languages, chat, and API key commands from the main window."
commands.allow = [
  "import_dictionary",
  "list_dictionaries",
  "remove_dictionary",
  "search_headwords",
  "get_headword_detail",
  "create_card_from_headword_detail",
  "update_card",
  "get_card",
  "list_cards",
  "delete_card",
  "create_collection",
  "list_collections",
  "rename_collection",
  "delete_collection",
  "start_review_session",
  "record_review_result",
  "list_languages",
  "create_language",
  "update_language",
  "delete_language",
  "list_headwords_for_language",
  "send_chat_message",
  "cancel_chat_stream",
  "create_chat_conversation",
  "list_chat_conversations",
  "get_chat_messages",
  "delete_chat_conversation",
  "save_api_credential",
  "get_api_credential",
  "delete_api_credential",
]
